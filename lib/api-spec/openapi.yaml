openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShopSaaS API — Nepali Shops in Japan
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: shops
    description: Shop discovery
  - name: products
    description: Product browsing
  - name: search
    description: Search
  - name: locations
    description: Location data
  - name: cart
    description: Shopping cart
  - name: orders
    description: Customer orders
  - name: account
    description: Customer account
  - name: dashboard
    description: Merchant dashboard
  - name: console
    description: Platform admin console
  - name: admin
    description: Tenant admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new merchant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── SHOPS ──────────────────────────────────────────────────────────────────

  /shops:
    get:
      operationId: listShops
      tags: [shops]
      summary: List all active shops
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: List of shops
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shop"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [shops, pagination]

  /shops/{slug}:
    get:
      operationId: getShop
      tags: [shops]
      summary: Get a shop by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── PRODUCTS ───────────────────────────────────────────────────────────────

  /shops/{shopSlug}/products:
    get:
      operationId: getProductsByShop
      tags: [products]
      summary: List products for a shop
      parameters:
        - in: path
          name: shopSlug
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [products, pagination]

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── SEARCH ─────────────────────────────────────────────────────────────────

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search shops and products
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [all, shops, products]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shop"
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                required: [shops, products]

  # ─── LOCATIONS ──────────────────────────────────────────────────────────────

  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List available prefectures and cities
      responses:
        "200":
          description: Locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  locations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Location"
                required: [locations]

  # ─── CART ───────────────────────────────────────────────────────────────────

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CartItem"
                required: [items]

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"

  /cart/items/{id}:
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ─── ORDERS ─────────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List customer orders
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                required: [orders]

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/checkout:
    post:
      operationId: checkout
      tags: [orders]
      summary: Place an order, optionally applying a coupon atomically
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid coupon or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── COUPONS ────────────────────────────────────────────────────────────────

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      summary: Validate a coupon code for a shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponBody"
      responses:
        "200":
          description: Coupon is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateCouponResponse"
        "400":
          description: Coupon invalid or conditions not met
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── ACCOUNT ────────────────────────────────────────────────────────────────

  /account:
    get:
      operationId: getAccount
      tags: [account]
      summary: Get current user account
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    put:
      operationId: updateAccount
      tags: [account]
      summary: Update account details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  # ─── DASHBOARD (MERCHANT) ────────────────────────────────────────────────────

  /dashboard/shop:
    get:
      operationId: getDashboardShop
      tags: [dashboard]
      summary: Get merchant shop
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
    put:
      operationId: updateDashboardShop
      tags: [dashboard]
      summary: Update merchant shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShopBody"
      responses:
        "200":
          description: Updated shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /dashboard/products:
    get:
      operationId: listDashboardProducts
      tags: [dashboard]
      summary: List merchant products
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                required: [products]
    post:
      operationId: createDashboardProduct
      tags: [dashboard]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /dashboard/products/{id}:
    put:
      operationId: updateDashboardProduct
      tags: [dashboard]
      summary: Update a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteDashboardProduct
      tags: [dashboard]
      summary: Delete a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /dashboard/orders:
    get:
      operationId: listDashboardOrders
      tags: [dashboard]
      summary: List merchant orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardOrder"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [orders, pagination]

  /dashboard/orders/{id}:
    get:
      operationId: getDashboardOrder
      tags: [dashboard]
      summary: Get a merchant order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOrder"

  /dashboard/orders/{id}/status:
    put:
      operationId: updateDashboardOrderStatus
      tags: [dashboard]
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOrder"

  /dashboard/analytics:
    get:
      operationId: getDashboardAnalytics
      tags: [dashboard]
      summary: Get merchant analytics
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [week, month, year]
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalytics"

  /dashboard/subscription:
    get:
      operationId: getDashboardSubscription
      tags: [dashboard]
      summary: Get subscription info
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  /dashboard/staff:
    get:
      operationId: listDashboardStaff
      tags: [dashboard]
      summary: List staff members
      responses:
        "200":
          description: Staff
          content:
            application/json:
              schema:
                type: object
                properties:
                  staff:
                    type: array
                    items:
                      $ref: "#/components/schemas/StaffMember"
                required: [staff]
    post:
      operationId: createDashboardStaff
      tags: [dashboard]
      summary: Add a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /dashboard/staff/{id}:
    delete:
      operationId: deleteDashboardStaff
      tags: [dashboard]
      summary: Remove a staff member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /dashboard/coupons:
    get:
      operationId: listDashboardCoupons
      tags: [dashboard]
      summary: List shop coupons
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  coupons:
                    type: array
                    items:
                      $ref: "#/components/schemas/Coupon"
                required: [coupons]
    post:
      operationId: createDashboardCoupon
      tags: [dashboard]
      summary: Create a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponBody"
      responses:
        "201":
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /dashboard/coupons/{id}:
    delete:
      operationId: deleteDashboardCoupon
      tags: [dashboard]
      summary: Delete a coupon
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /dashboard/store-categories:
    get:
      operationId: listDashboardStoreCategories
      tags: [dashboard]
      summary: List store categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoreCategory"
                required: [categories]
    post:
      operationId: createDashboardStoreCategory
      tags: [dashboard]
      summary: Create a store category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required: [name]
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreCategory"

  /dashboard/store-categories/{id}:
    put:
      operationId: updateDashboardStoreCategory
      tags: [dashboard]
      summary: Update a store category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isVisible:
                  type: boolean
                sortOrder:
                  type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreCategory"
    delete:
      operationId: deleteDashboardStoreCategory
      tags: [dashboard]
      summary: Delete a store category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ─── CONSOLE (PLATFORM ADMIN) ────────────────────────────────────────────────

  /console/tenants:
    get:
      operationId: listConsoleTenants
      tags: [console]
      summary: List all tenants
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [tenants, pagination]
    post:
      operationId: createConsoleTenant
      tags: [console]
      summary: Create a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: "#/components/schemas/Tenant"
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                  tempPassword:
                    type: string

  /console/tenants/{id}:
    put:
      operationId: updateConsoleTenant
      tags: [console]
      summary: Update a tenant status or tier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /console/tenants/{id}/enter:
    post:
      operationId: enterConsoleTenant
      tags: [console]
      summary: Impersonate a tenant admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  tenantId:
                    type: string
                  tenantName:
                    type: string

  /console/analytics:
    get:
      operationId: getConsoleAnalytics
      tags: [console]
      summary: Platform-wide analytics
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleAnalytics"

  /console/customers:
    get:
      operationId: listConsoleCustomers
      tags: [console]
      summary: List all customers
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [customers, pagination]

  /console/audit-logs:
    get:
      operationId: listConsoleAuditLogs
      tags: [console]
      summary: List audit logs
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: tenantId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [logs, pagination]

  # ─── ADMIN (TENANT ADMIN) ────────────────────────────────────────────────────

  /admin/customers:
    get:
      operationId: listAdminCustomers
      tags: [admin]
      summary: List customers for this tenant
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required: [customers, pagination]

  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: Tenant admin overview stats
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"

